# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Blazor Web (główna strona) ──────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Hardened TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           strict-origin-when-cross-origin                 always;

    # ── REST API (/api/*) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Swagger (opcjonalnie ogranicz dostęp) ─────────────────
    location /swagger {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Odkomentuj poniżej, żeby ograniczyć Swagger do konkretnego IP:
        # allow 1.2.3.4;
        # deny all;
    }

    # ── Blazor SignalR WebSocket (_blazor) ────────────────────
    location /_blazor {
        proxy_pass             http://web:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        $connection_upgrade;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     3600s;   # długi timeout dla WS
        proxy_send_timeout     3600s;
        proxy_buffering        off;
    }

    # ── Blazor statyczne zasoby ───────────────────────────────
    # CSS/JS: krótki cache + must-revalidate (unikamy starego CSS po deployu)
    location ~* \.(css|js|map)$ {
        proxy_pass       http://web:8080;
        proxy_set_header Host $host;
        add_header       Cache-Control "public, max-age=300, must-revalidate";
    }

    location ~* \.(wasm|gz|br|svg|ico|png|woff2?)$ {
        proxy_pass       http://web:8080;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Blazor Web (HTML — bez cache, żeby po deployu od razu nowa wersja) ──
    location / {
        proxy_pass         http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header         Cache-Control "no-cache, no-store, must-revalidate";
    }
}
