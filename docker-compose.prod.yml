services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: typer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - typer_pgdata:/var/lib/postgresql/data
    networks:
      - typer-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Typer.Api ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/Typer.Api/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: typer-api:latest
    container_name: typer-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-Typer.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-Typer.Client}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-120}
      ASPNETCORE_ENVIRONMENT: Production
    networks:
      - typer-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Typer.Web ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: src/Typer.Web/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: typer-web:latest
    container_name: typer-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-Typer.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-Typer.Client}
      ApiBaseUrl: http://api:8080
      ApiFootball__Enabled: ${API_FOOTBALL_ENABLED:-false}
      ApiFootball__ApiKey: ${API_FOOTBALL_API_KEY:-}
      ApiFootball__PollIntervalMinutes: 5
      ASPNETCORE_ENVIRONMENT: Production
    networks:
      - typer-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Nginx (reverse proxy + TLS termination) ──────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: typer-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - typer-internal
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -fs http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (Let's Encrypt renewal) ─────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: typer-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $!;
        done
      "

networks:
  typer-internal:
    driver: bridge

volumes:
  typer_pgdata:
  certbot-www:
